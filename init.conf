{
  "listen": {
    "ip": "any",
    "port": 9118,
    "compression": true
  },
  "disableEng": true,
  "multiaccess": true,
  "typecache": "mem",
  "mikrotik": false,
  "evercache": true,
  "cache": {
    "type": "mem",
    "extend": 1800
  },
  "rch": {
    "websoket": "signalr"
  },
  "LampaWeb": {
    "initPlugins": {
      "transcoding": true
    },
    "appReplace": {
      "var sources\\s*=\\s*\\{\\s*([^}]+)\\s*\\};": "var sources = { tmdb: TMDB };",
      "checkPremium\\(\\) \\{": "checkPremium() { return 1;",
      "this.add = function \\(\\) \\{": "this.add = function () { return;",
      "full-start__button selector button--subscribe": "full-start__button selector button--subscribe hide"
    }
  },
  "trackstranscoding": {
    "enable": true,
    "idleTimeoutSec": 200,
    "idleTimeoutSec_live": 100,
    "audioOptions": {
      "bitrateKbps": 192,
      "codec_copy": [
        "aac",
        "mp3",
        "ac3",
        "eac3",
        "dts"
      ]
    },
    "playlistOptions": {
      "readrate": 1.3,
      "burst": 20971520,
      "delete_segments": false
    }
  },
  "transcoding": {
    "enable": true,
    "convertOptions": {
      "transcodeVideo": false
    }
  },
  "firefox": {
    "enable": false,
    "Headless": false
  },
